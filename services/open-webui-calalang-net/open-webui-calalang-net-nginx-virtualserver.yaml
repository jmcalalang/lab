apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: open-webui.calalang.net
  namespace: open-webui
  annotations:
    appprotect.f5.com/app-protect-enable: "False"
spec:
  ingressClassName: nginx
  host: open-webui.calalang.net
  tls:
    secret: open-webui-calalang-net-tls-secret
    redirect:
      enable: true
  upstreams:
    - name: open-webui
      service: open-webui
      port: 80
      buffering: false
      readTimeout: 3600s
      sendTimeout: 3600s
  routes:
    - path: /api
      location-snippets: |
        proxy_cache off;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        # SSE / streaming support
        proxy_set_header Accept-Encoding "";
        gzip off;
      action:
        pass: open-webui
    # WebSockets
    - path: /ws
      location-snippets: |
        proxy_cache off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Proto https;
      action:
        pass: open-webui
    # UI + everything else
    - path: /
      location-snippets: |
        proxy_set_header X-Forwarded-Proto https;
      policies:
        - name: open-webui-calalang-net-oidc-policy
      action:
        pass: open-webui
