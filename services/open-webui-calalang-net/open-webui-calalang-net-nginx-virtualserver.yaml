apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: open-webui.calalang.net
  namespace: open-webui
spec:
  ingressClassName: nginx
  host: open-webui.calalang.net
  tls:
    secret: open-webui-calalang-net-tls-secret
    redirect:
      enable: true
  upstreams:
    - name: open-webui
      service: open-webui
      port: 80
  routes:
    - path: /api/
      action:
        proxy:
          upstream: open-webui
    - path: /ws/
      action:
        proxy:
          upstream: open-webui
    - path: /
      policies:
        - name: open-webui-calalang-net-oidc-policy
      action:
        proxy:
          upstream: open-webui
    - path: /__whoami
      policies:
        - name: open-webui-calalang-net-oidc-policy
      action:
        return:
          code: 200
          type: text/plain
          body: "email=$oidc_claim_email\npreferred_username=$oidc_claim_preferred_username\nupn=$oidc_claim_upn\nname=$oidc_claim_name\n"

