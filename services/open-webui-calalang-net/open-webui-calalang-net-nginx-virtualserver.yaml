apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: open-webui.calalang.net
spec:
  ingressClassName: nginx
  host: open-webui.calalang.net
  tls:
    secret: open-webui-calalang-net-tls-secret
    redirect:
      enable: true

  upstreams:
    - name: open-webui
      service: open-webui
      port: 80

  routes:
    - path: /api/
      policies:
        - name: open-webui-calalang-net-oidc-policy
      errorPages:
        - codes: [302]
          return:
            code: 401
            type: application/json
            body: "{\"detail\":\"unauthorized\"}\n"
      action:
        proxy:
          upstream: open-webui

    - path: /ws/
      policies:
        - name: open-webui-calalang-net-oidc-policy
      errorPages:
        - codes: [302]
          return:
            code: 401
            type: application/json
            body: "{\"detail\":\"unauthorized\"}\n"
      action:
        proxy:
          upstream: open-webui

    - path: /
      policies:
        - name: open-webui-calalang-net-oidc-policy
      action:
        proxy:
          upstream: open-webui
