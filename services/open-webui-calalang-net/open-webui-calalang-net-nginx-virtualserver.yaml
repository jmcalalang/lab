apiVersion: k8s.nginx.org/v1
kind: VirtualServer
metadata:
  name: open-webui.calalang.net
  namespace: open-webui
spec:
  ingressClassName: nginx
  host: open-webui.calalang.net
  tls:
    secret: open-webui-calalang-net-tls-secret
    redirect:
      enable: true
  upstreams:
    - name: open-webui
      service: open-webui
      port: 80
  routes:
    - path: /
      policies:
        - name: open-webui-calalang-net-oidc-policy
      action:
        pass: open-webui
    - path: /ws
      action:
        pass: open-webui
